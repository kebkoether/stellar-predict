<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bush1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="48" fill="#0F172A"/>
  <!-- Large hedge bush -->
  <ellipse cx="128" cy="195" rx="100" ry="45" fill="#166534"/>
  <ellipse cx="75" cy="170" rx="60" ry="50" fill="url(#bush1)"/>
  <ellipse cx="180" cy="165" rx="60" ry="55" fill="url(#bush1)"/>
  <ellipse cx="128" cy="155" rx="65" ry="48" fill="#22C55E"/>
  <ellipse cx="128" cy="140" rx="45" ry="30" fill="#4ADE80"/>
  <!-- Dollar signs growing up from the bush -->
  <text x="80" y="105" font-family="Arial, sans-serif" font-size="48" font-weight="900" fill="url(#gold)" opacity="0.95">$</text>
  <text x="128" y="78" font-family="Arial, sans-serif" font-size="56" font-weight="900" fill="url(#gold)">$</text>
  <text x="168" y="100" font-family="Arial, sans-serif" font-size="40" font-weight="900" fill="url(#gold)" opacity="0.85">$</text>
</svg>
